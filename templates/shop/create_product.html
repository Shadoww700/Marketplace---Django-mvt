{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO•CORE - Add Cyber Product</title>
    <link rel="stylesheet" href="{% static 'css/cyber.css' %}">
</head>
<body>

    <div class="auth-container" style="max-width: 550px;">
        <h2 class="auth-title">List New Product</h2>
        
        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <!-- enctype важен для загрузки файлов! -->
        <form method="POST" action="{% url 'create_product' %}" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Product Title</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="e.g., Quantum Processor v9" required>
            </div>

            <div class="form-group">
                <label for="category">Sector (Category)</label>
                <select id="category" name="category" class="form-control" style="background: rgba(0,0,0,0.4); color: #fff; border: 1px solid var(--glass-border); padding: 10px; border-radius: 6px; width: 100%;" required>
                    <option value="" disabled selected>Select a sector...</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price (USD)</label>
                <input type="number" id="price" name="price" step="0.01" min="0.1" class="form-control" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="quantity">Available Quantity</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="image">Product Image Interface</label>
                <input type="file" id="image" name="image" class="form-control" accept="image/*" style="padding: 8px;">
            </div>

            <div class="form-group">
                <label for="description">Technical Specifications</label>
                <textarea id="description" name="description" class="form-control" placeholder="Describe the item architecture..." rows="4" style="resize: none;" required></textarea>
            </div>

            <button type="submit" class="cyber-btn">Inject to Marketplace</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'shop_home' %}">Cancel & Return</a>
        </div>
    </div>

</body>
</html>
