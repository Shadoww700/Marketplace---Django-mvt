{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO•CORE - Merchant Application</title>
    <link rel="stylesheet" href="{% static 'css/cyber.css' %}">
</head>
<body>

    <div class="auth-container">
        <h2 class="auth-title">Merchant Request</h2>
        
        <p style="text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 14px;">
            Apply for SELLER status to start listing your cybernetic items in the market grid.
        </p>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'become_seller' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="message">Application Message</label>
                <textarea id="message" name="message" class="form-control" placeholder="Tell the administrator about your store or products..." rows="5" style="resize: none; font-family: inherit;" required></textarea>
            </div>

            <button type="submit" class="cyber-btn">Submit Application</button>
        </form>

        <div class="auth-footer">
            Changed your mind? <a href="{% url 'shop_home' %}">Return to Market</a>
        </div>
    </div>

</body>
</html>
