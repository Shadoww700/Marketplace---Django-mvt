{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO•CORE - Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/cyber.css' %}">
</head>
<body>

    <div class="auth-container">
        <h2 class="auth-title">Registration</h2>

        <!-- Выводим ошибку, если она передана из views.py -->
        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <!-- Кастомная HTML-форма без использования django.forms -->
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" value="{{ data.username }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter email" value="{{ data.email }}" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="cyber-btn">Initialize Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="#">Sign In</a>
        </div>
    </div>

</body>
</html>
